[build]
  builder = "NIXPACKS"
  buildCommand = "cd backend && npm install && npx prisma generate && npm run build && cd ../frontend && npm install && npm run build"

[[services]]
  name = "mbom-backend"
  port = 8080
  healthCheckPath = "/api/health"
  startCommand = "cd backend && npm start"

  [services.environment]
    NODE_ENV = "production"
    PORT = "8080"
